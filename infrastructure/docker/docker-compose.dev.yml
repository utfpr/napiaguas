name: napi-aguas-dev

services:
  postgres:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.postgres
    container_name: napi_aguas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-napi_aguas_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-napi_aguas_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - napi-network

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
      target: development
    container_name: napi_aguas_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/napi_aguas_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-napi_aguas_dev}
    ports:
      - "${API_PORT:-3000}:3000"
    working_dir: /workspace/apps/api
    command: >-
      sh -c "pnpm install --frozen-lockfile --filter @napi-aguas/api... && pnpm dev:docker"
    volumes:
      - ../..:/workspace
      - api_node_modules:/workspace/node_modules
      - api_app_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/workspace/.pnpm-store
    networks:
      - napi-network

networks:
  napi-network:
    driver: bridge

volumes:
  postgres_data:
  api_node_modules:
  api_app_node_modules:
  pnpm_store:
